<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>澳打記帳與投資管理 Pro</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1 class="main-title">🦘 澳打資產管理 Pro</h1>
        <div class="author-info">
          <p>製作人：Rei Liao</p>
        </div>
      </header>

      <main id="main-content">
        <section class="card shadow primary-card">
          <h2><i class="fas fa-coins"></i> 總資產估算 (現金 + 股票)</h2>
          <div class="asset-evaluation">
            <div class="eval-grid">
              <div class="eval-item"><small>換算 AUD</small><div id="eval-aud" class="main-value">$ 0.00</div></div>
              <div class="eval-item"><small>換算 TWD</small><div id="eval-twd" class="main-value">$ 0</div></div>
              <div class="eval-item"><small>換算 USD</small><div id="eval-usd" class="main-value">$ 0.00</div></div>
            </div>
          </div>
          <div class="exchange-rate-info" id="exchange-info"></div>
          
          <div class="currency-details">
            <div class="card-header-flex" style="border:none; padding:0; margin-bottom:5px;">
                <div class="detail-title">目前資產分佈</div>
                <button class="mini-btn" onclick="toggleAccountModal()"><i class="fas fa-plus"></i> 管理單位</button>
            </div>
            <div id="account-display-list" class="account-list">
                </div>
          </div>
        </section>

        <section class="card shadow">
          <h2><i class="fas fa-calendar-check"></i> 簽證天數與薪資計算</h2>
          <div class="progress-container">
            <div class="progress-row">
              <div class="progress-info"><span>二簽 (88天)</span><b id="days-2nd-text">0 / 88</b></div>
              <div class="progress-bar"><div class="progress-fill" id="progress-2nd"></div></div>
            </div>
          </div>
          
          <div class="salary-calc-area">
            <div class="input-flex">
              <input type="number" id="work-hours-input" placeholder="今日時數">
              <input type="number" id="work-wage" placeholder="時薪" oninput="saveSalaryBase()">
            </div>
            <div class="salary-result">
              <div class="salary-text">累計時數：<b id="total-hours-display">0</b> hr</div>
              <div class="salary-text">預計薪資：<b id="weekly-salary-display">0.00</b></div>
            </div>
            <div class="work-btn-sub mt-10">
                <button onclick="appendHours()" class="work-btn-large" style="flex:2; background: #2c3e50;">累加時數</button>
                <button onclick="resetWeeklySalary()" class="mini-btn" style="flex:1;">重置全部</button>
            </div>
          </div>

          <div class="work-action-group mt-10">
            <button class="work-btn-large" onclick="addWorkDay()">完成一天工作 (打卡)</button>
            <div class="work-btn-sub">
              <button onclick="undoWorkDay()">按錯ㄌ</button>
              <button onclick="showWorkLogs()">打卡紀錄</button>
            </div>
          </div>
        </section>

        <section class="card shadow">
          <h2><i class="fas fa-edit"></i> 新增收支紀錄</h2>
          <div class="input-form">
            <div class="type-switcher" id="type-container">
              <button class="type-btn active" data-type="expense" onclick="setType('expense')">支出</button>
              <button class="type-btn" data-type="income" onclick="setType('income')">收入</button>
            </div>
            
            <div class="mt-10 full-width-input">
              <input type="date" id="trans-date" class="styled-date-input">
            </div>

            <div class="input-flex mt-10">
              <select id="trans-account" class="styled-select">
                  </select>
              <input type="number" id="trans-amount" placeholder="金額" style="flex: 1;">
            </div>
            <input type="text" id="trans-desc" placeholder="項目說明" class="mt-10">

            <button class="btn-primary" onclick="addTransaction()">確認送出</button>
          </div>
        </section>

        <section class="card shadow">
          <div class="card-header-flex" style="border:none; margin:0;">
            <h2 style="border:none;"><i class="fas fa-history"></i> 最近紀錄</h2>
            <div>
                <button class="mini-btn" onclick="toggleHistoryModal()">展開編輯</button>
                <button class="btn-reset-inline" onclick="resetAssets()">清空所有</button>
            </div>
          </div>
          <ul id="transaction-list" class="list-unstyled"></ul>
        </section>

      </main>

      <div id="account-modal" class="modal">
        <div class="modal-content">
          <div class="modal-header">
            <h3>管理存款單位</h3>
            <span class="close" onclick="toggleAccountModal()">&times;</span>
          </div>
          <div class="input-flex">
              <input type="text" id="new-acc-name" placeholder="單位名稱 (如:NAB)">
              <select id="new-acc-curr" class="styled-select" style="flex:0.5">
                  <option value="AUD">AUD</option>
                  <option value="TWD">TWD</option>
                  <option value="USD">USD</option>
              </select>
          </div>
          <button class="btn-primary" onclick="addAccount()">新增單位</button>
          <div id="account-manage-list" class="mt-10"></div>
        </div>
      </div>

      <div id="history-modal" class="modal">
        <div class="modal-content" style="max-width: 450px;">
          <div class="modal-header">
            <h3>紀錄維護 (僅限修改內容)</h3>
            <span class="close" onclick="toggleHistoryModal()">&times;</span>
          </div>
          <div id="full-history-list"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
